<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎯 Job Hunt Command Center</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #0f0f1a;
            color: #e0e0ff;
            min-height: 100vh;
        }
        .header {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            padding: 20px 30px;
            border-bottom: 2px solid #00d4ff;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header h1 {
            font-size: 24px;
            color: #00d4ff;
            text-shadow: 0 0 20px rgba(0, 212, 255, 0.5);
        }
        .header-stats {
            display: flex;
            gap: 30px;
        }
        .stat {
            text-align: center;
        }
        .stat-value {
            font-size: 28px;
            font-weight: bold;
            color: #00d4ff;
        }
        .stat-label {
            font-size: 12px;
            color: #8b9bb4;
        }
        .container {
            padding: 30px;
            overflow-x: auto;
        }
        .kanban-board {
            display: flex;
            gap: 20px;
            min-width: max-content;
        }
        .kanban-column {
            width: 320px;
            background: rgba(26, 26, 46, 0.8);
            border-radius: 12px;
            padding: 15px;
            border: 1px solid rgba(0, 212, 255, 0.2);
            display: flex;
            flex-direction: column;
            max-height: calc(100vh - 150px);
        }
        .column-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 15px;
            margin-bottom: 15px;
            border-bottom: 2px solid;
        }
        .column-title {
            font-size: 14px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .column-count {
            background: rgba(255,255,255,0.1);
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 12px;
        }
        .column-new .column-header { color: #ff6b6b; border-color: #ff6b6b; }
        .column-qualified .column-header { color: #ffa502; border-color: #ffa502; }
        .column-applying .column-header { color: #ffd93d; border-color: #ffd93d; }
        .column-applied .column-header { color: #6bcb77; border-color: #6bcb77; }
        .column-interview .column-header { color: #00d4ff; border-color: #00d4ff; }
        .column-offer .column-header { color: #a29bfe; border-color: #a29bfe; }
        .column-closed .column-header { color: #636e72; border-color: #636e72; }
        .jobs-container {
            flex: 1;
            overflow-y: auto;
            min-height: 100px;
        }
        .job-card {
            background: linear-gradient(135deg, #1e1e3a 0%, #252548 100%);
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 12px;
            border-left: 4px solid;
            cursor: grab;
            transition: transform 0.2s, box-shadow 0.2s;
            position: relative;
        }
        .job-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 212, 255, 0.15);
        }
        .job-card.dragging {
            opacity: 0.5;
            cursor: grabbing;
        }
        .job-card.score-high { border-left-color: #2ed573; }
        .job-card.score-med { border-left-color: #ffa502; }
        .job-card.score-low { border-left-color: #ff4757; }
        .job-title {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 6px;
            line-height: 1.3;
        }
        .job-company {
            font-size: 13px;
            color: #00d4ff;
            margin-bottom: 4px;
        }
        .job-location {
            font-size: 11px;
            color: #8b9bb4;
            margin-bottom: 8px;
        }
        .job-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 11px;
        }
        .job-score {
            background: rgba(0, 212, 255, 0.2);
            padding: 3px 8px;
            border-radius: 4px;
            color: #00d4ff;
            font-weight: 600;
        }
        .job-source {
            color: #8b9bb4;
        }
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #636e72;
            font-size: 13px;
        }
        .loading {
            text-align: center;
            padding: 20px;
            color: #00d4ff;
        }
        .error {
            text-align: center;
            padding: 20px;
            color: #ff6b6b;
        }
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: rgba(15, 15, 26, 0.5);
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(0, 212, 255, 0.3);
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(0, 212, 255, 0.5);
        }
    </style>
</head>
<body>
    <header class="header">
        <h1>🎯 Job Hunt Command Center</h1>
        <div class="header-stats">
            <div class="stat">
                <div class="stat-value" id="stat-total">0</div>
                <div class="stat-label">Total Jobs</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="stat-applied">0</div>
                <div class="stat-label">Applied</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="stat-interview">0</div>
                <div class="stat-label">Interviews</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="stat-offer">0</div>
                <div class="stat-label">Offers</div>
            </div>
        </div>
    </header>

    <div class="container">
        <div class="kanban-board">
            <div class="kanban-column column-new" data-status="new">
                <div class="column-header">
                    <span class="column-title">📥 New</span>
                    <span class="column-count" id="count-new">0</span>
                </div>
                <div class="jobs-container" id="col-new">
                    <div class="loading">Loading jobs...</div>
                </div>
            </div>
            <div class="kanban-column column-qualified" data-status="qualified">
                <div class="column-header">
                    <span class="column-title">⚡ Qualified</span>
                    <span class="column-count" id="count-qualified">0</span>
                </div>
                <div class="jobs-container" id="col-qualified">
                    <div class="loading">Loading jobs...</div>
                </div>
            </div>
            <div class="kanban-column column-applying" data-status="applying">
                <div class="column-header">
                    <span class="column-title">✍️ Applying</span>
                    <span class="column-count" id="count-applying">0</span>
                </div>
                <div class="jobs-container" id="col-applying">
                    <div class="loading">Loading jobs...</div>
                </div>
            </div>
            <div class="kanban-column column-applied" data-status="applied">
                <div class="column-header">
                    <span class="column-title">📤 Applied</span>
                    <span class="column-count" id="count-applied">0</span>
                </div>
                <div class="jobs-container" id="col-applied">
                    <div class="loading">Loading jobs...</div>
                </div>
            </div>
            <div class="kanban-column column-interview" data-status="interview">
                <div class="column-header">
                    <span class="column-title">🎤 Interview</span>
                    <span class="column-count" id="count-interview">0</span>
                </div>
                <div class="jobs-container" id="col-interview">
                    <div class="loading">Loading jobs...</div>
                </div>
            </div>
            <div class="kanban-column column-offer" data-status="offer">
                <div class="column-header">
                    <span class="column-title">💰 Offer</span>
                    <span class="column-count" id="count-offer">0</span>
                </div>
                <div class="jobs-container" id="col-offer">
                    <div class="loading">Loading jobs...</div>
                </div>
            </div>
            <div class="kanban-column column-closed" data-status="closed">
                <div class="column-header">
                    <span class="column-title">✓ Closed</span>
                    <span class="column-count" id="count-closed">0</span>
                </div>
                <div class="jobs-container" id="col-closed">
                    <div class="loading">Loading jobs...</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = window.location.origin + '/api';
        const columns = ['new', 'qualified', 'applying', 'applied', 'interview', 'offer', 'closed'];
        let jobs = [];

        async function loadJobs() {
            try {
                const response = await fetch(`${API_BASE}/jobs`);
                const data = await response.json();
                jobs = data.jobs || [];
                renderBoard();
                updateStats();
            } catch (e) {
                console.error('Failed to load jobs:', e);
                columns.forEach(col => {
                    document.getElementById(`col-${col}`).innerHTML = 
                        `<div class="error">Failed to load jobs. Check API connection.</div>`;
                });
            }
        }

        async function updateStats() {
            try {
                const response = await fetch(`${API_BASE}/stats`);
                const stats = await response.json();
                document.getElementById('stat-total').textContent = stats.total || 0;
                document.getElementById('stat-applied').textContent = stats.applied || 0;
                document.getElementById('stat-interview').textContent = stats.interview || 0;
                document.getElementById('stat-offer').textContent = stats.offer || 0;
            } catch (e) {
                console.error('Failed to load stats:', e);
            }
        }

        function renderBoard() {
            columns.forEach(col => {
                const container = document.getElementById(`col-${col}`);
                container.innerHTML = '';
                const colJobs = jobs.filter(j => (j.status || 'new') === col);
                
                document.getElementById(`count-${col}`).textContent = colJobs.length;

                if (colJobs.length === 0) {
                    container.innerHTML = `<div class="empty-state">No jobs in this stage</div>`;
                } else {
                    colJobs.forEach(job => {
                        container.appendChild(createJobCard(job));
                    });
                }
            });
        }

        function createJobCard(job) {
            const card = document.createElement('div');
            const scoreClass = job.score >= 80 ? 'high' : job.score >= 70 ? 'med' : 'low';
            card.className = `job-card score-${scoreClass}`;
            card.draggable = true;
            card.dataset.jobId = job.id;
            
            card.innerHTML = `
                <div class="job-title">${job.title}</div>
                <div class="job-company">${job.company}</div>
                <div class="job-location">${job.location}</div>
                <div class="job-meta">
                    <span class="job-score">${job.score}</span>
                    <span class="job-source">${job.source}</span>
                </div>
            `;

            card.addEventListener('dragstart', (e) => {
                e.dataTransfer.setData('jobId', job.id);
                card.classList.add('dragging');
            });

            card.addEventListener('dragend', () => {
                card.classList.remove('dragging');
            });

            return card;
        }

        function allowDrop(e) {
            e.preventDefault();
        }

        async function drop(e) {
            e.preventDefault();
            const jobId = e.dataTransfer.getData('jobId');
            const newStatus = e.target.closest('.kanban-column').dataset.status;
            
            if (!jobId || !newStatus) return;
            
            const job = jobs.find(j => j.id === jobId);
            if (!job || job.status === newStatus) return;

            try {
                const response = await fetch(`${API_BASE}/jobs/${jobId}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ status: newStatus })
                });
                
                if (response.ok) {
                    job.status = newStatus;
                    renderBoard();
                    updateStats();
                }
            } catch (err) {
                console.error('Failed to update job:', err);
            }
        }

        // Setup drag and drop
        columns.forEach(col => {
            const container = document.getElementById(`col-${col}`);
            container.addEventListener('dragover', allowDrop);
            container.addEventListener('drop', drop);
        });

        // Load on start
        loadJobs();
        updateStats();
    </script>
</body>
</html>
